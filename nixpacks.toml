[phases.setup]
nixPkgs = ["nodejs_22"]
aptPkgs = [
  "chromium-browser",
  "chromium-chromedriver",
  "libglib2.0-0",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "fonts-liberation"
]

[phases.build]
cmds = ["npm ci", "npm run build"]

[phases.deploy]
cmd = "node scripts/init-postgres.js && node scripts/seed-postgres.js && npm start"

[variables]
NODE_VERSION = "22"
