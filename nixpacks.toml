[phases.setup]
nixPkgs = ["nodejs_22", "chromium", "nss", "nspr", "atk", "cups", "dbus", "expat", "libdrm", "libxkbcommon", "mesa", "libGL", "pango", "cairo", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxcb", "xorg.libXcursor", "xorg.libXi", "xorg.libXrender", "xorg.libXtst", "alsa-lib", "at-spi2-atk", "at-spi2-core", "gtk3", "glib"]

[phases.build]
cmds = ["npm ci", "npm run build"]

[phases.deploy]
cmd = "node scripts/init-postgres.js && node scripts/seed-postgres.js && npm start"

[variables]
NODE_VERSION = "22"
